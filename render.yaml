services:
  - type: web
    name: maitrilearn-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --workers 2 --threads 4 --worker-class gthread --timeout 60 --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      # ── LLM fallback providers (services/llm_service.py) ─────────────────
      # Optional but strongly recommended: without these, a Groq rate-limit
      # takes the whole platform down. Get free keys at:
      #   Cerebras: https://cloud.cerebras.ai
      #   Gemini:   https://aistudio.google.com/apikey
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── Admin auth (utils/auth.py) ────────────────────────────────────────
      # REQUIRED. Without this, /rag/ingest and /rag/delete fail closed
      # (503) rather than being left open — set this to any long random
      # string and pass it as the X-Admin-Key header from the admin UI.
      - key: ADMIN_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: LOCAL_EMBED_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
