services:
  - type: web
    name: maitrilearn-backend
    env: python
    buildCommand: pip install -r requirements.txt
    # QA audit HIGH finding (H-03): P99 whiteboard latency = 46.5s under 10
    # concurrent requests. --threads 4 meant only 2 workers x 4 threads = 8
    # concurrent request slots — the 9th and 10th concurrent request queued
    # behind an in-flight ~20-40s LLM call before even starting. Each request
    # spends nearly all its time blocked on network I/O to the LLM provider
    # (not CPU), so gthread can safely handle far more threads per worker
    # than CPU core count would suggest — raised to 16. Paired with the
    # per-topic single-flight lock in routes/whiteboard.py (which collapses
    # duplicate concurrent requests for the same topic into one LLM call),
    # this addresses both causes of the stress-test P99 spike. Workers stay
    # at 2 — more worker PROCESSES (vs threads) cost real RAM on Render's
    # free tier and risk OOM, whereas more threads within existing workers
    # are cheap for I/O-bound work like this.
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --workers 2 --threads 16 --worker-class gthread --timeout 60 --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      # ── LLM fallback providers (services/llm_service.py) ─────────────────
      # Optional but strongly recommended: without these, a Groq rate-limit
      # takes the whole platform down. Get free keys at:
      #   Cerebras: https://cloud.cerebras.ai
      #   Gemini:   https://aistudio.google.com/apikey
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── Admin auth (utils/auth.py) ────────────────────────────────────────
      # REQUIRED. Without this, /rag/ingest and /rag/delete fail closed
      # (503) rather than being left open — set this to any long random
      # string and pass it as the X-Admin-Key header from the admin UI.
      - key: ADMIN_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: LOCAL_EMBED_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
