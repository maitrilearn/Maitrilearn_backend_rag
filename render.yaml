services:
  - type: web
    name: maitrilearn-backend
    env: python
    buildCommand: pip install -r requirements.txt
    # Increased timeout to 300s for PDF processing
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --workers 1 --timeout 300
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
